services:
  postgres:
    image: postgres:16-alpine
    container_name: n8n_db
    restart: always
    environment:
      - POSTGRES_USER=${DB_POSTGRESDB_USER}
      - POSTGRES_PASSWORD=${DB_POSTGRESDB_PASSWORD}
      - POSTGRES_DB=${DB_POSTGRESDB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${DB_POSTGRESDB_USER} -d ${DB_POSTGRESDB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    build: .
    container_name: n8n_app
    restart: always
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
      - TZ=Asia/Ho_Chi_Minh
      - N8N_LISTEN_ADDRESS=0.0.0.0
      - N8N_HOST=n8n
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_SERVER_ENABLED=true
      - N8N_RUNNERS_AUTH_TOKEN=my-runner-secret-token
      - N8N_RUNNERS_TASK_REQUEST_TIMEOUT=60
      - N8N_RUNNERS_CONFIG_FILE=/n8n-task-runners.json
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${DB_POSTGRESDB_DATABASE}
      - DB_POSTGRESDB_USER=${DB_POSTGRESDB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD}
      - DB_POSTGRESDB_SCHEMA=public
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - NODE_FUNCTION_ALLOW_BUILTIN=*
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-task-runners.json:/etc/n8n-task-runners.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  runners:
    build:
      context: .
      dockerfile: Dockerfile.runners
    container_name: n8n_runners
    restart: always
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=my-runner-secret-token
      - N8N_RUNNERS_SERVER_ENDPOINT=http://n8n:5678
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - N8N_RUNNERS_TASK_REQUEST_TIMEOUT=60
    volumes:
      - ./n8n-task-runners.json:/etc/n8n-task-runners.json:ro
    depends_on:
      - n8n

volumes:
  n8n_data:
  postgres_data: